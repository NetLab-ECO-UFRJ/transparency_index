special_criteria:
- code: UGC_SC1
  title: Does the platform provide an API that enables the structured extraction of
    public user-generated content data for independent analysis?
  description: Verifies whether the platform provides an API with at least one endpoint
    for programmatically extracting public user-generated content to the users’ infrastructure,
    without requiring privileged or internal access beyond standard developer registration.
  weight: 0.3
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: researchers_only
    label: Yes, but only for approved researchers
    weight: 0.5
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_SC2
  title: Can the full scope of public content data be extracted through the platform’s
    API?
  description: Verifies whether the platform enables programmatic discovery and extraction
    of data from the complete set of public user-generated content, without exclusions
    or artificial restrictions that limit data completeness.
  weight: 0.3
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: researchers_only
    label: Yes, but only for approved researchers
    weight: 0.5
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_SC3
  title: Is access to the platform’s API free of charge?
  description: Verifies whether API use is free of charge, confirming via documentation
    and pricing policies that no fees are applied for API access.
  weight: 0.3
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: researchers_only
    label: Yes, but only for approved researchers
    weight: 0.5
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_SC4
  title: Does the platform offer a graphical interface for extracting data?
  description: Verifies whether the platform offers a graphical interface for observing
    and collecting data to the users’ infrastructure, such as a dashboard or export
    feature, allowing extraction of public content data without programming.
  weight: 0.1
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: researchers_only
    label: Yes, but only for approved researchers
    weight: 0.5
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
accessibility:
- code: UGC_OC1
  title: Can the requested data be extracted directly from the platform’s API response?
  description: Verifies whether the API returns structured data directly in its response
    payload, rather than only providing redirect links to the data (excluding audiovisual
    media such as images, video, and audio).
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC2
  title: Does the platform's API support renewable authentication mechanisms without risk of data loss?
  description: Verifies whether the API's authentication mechanism (e.g., tokens, keys, or other access methods) can be renewed or updated without interrupting data collection, losing access, or compromising the continuity and integrity of monitoring and extraction.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC3
  title: Does the platform’s API offer an endpoint for extracting data from an individual
    publication?
  description: Verifies whether data from a specific public post can be collected
    using its unique identifier, without relying only on search terms or filters.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: researchers_only
    label: Yes, but only for approved researchers
    weight: 0.5
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC4
  title: Does the platform’s API offer an endpoint for extracting data from an individual
    author?
  description: Verifies whether it is possible to collect data from public posts made
    by a specific author using their username or unique identifier.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC5
  title: Does the platform’s API provide an endpoint for extracting data based on
    search terms?
  description: Verifies whether public user-generated content can be collected by
    querying individual or combined search terms, enabling datasets of posts mentioning
    those terms.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC6
  title: Does the API use locale-neutral data representations?
  # https://www.w3.org/TR/ltli/
  description: Verifies whether locale-sensitive data (such as timestamps, currency,
    and numbers) are returned in a locale-neutral format or accompanied by relevant
    locale metadata.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
compliance:
- code: UGC_OC7
  title: Does the platform implement a proper deprecation strategy to avoid breaking
    client applications while rolling out major changes in the API?
  description: Verifies whether the platform documents a deprecation strategy with
    a grace period before removing features, including deprecation and removal dates
    and migration instructions.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC8
  title: Is the platform’s API documentation published in open access?
  description: Verifies whether full API documentation is openly available on the
    internet without requiring registration, login, or account creation.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC9
  title: Is the platform’s API documentation clearly written and exemplified?
  description: Verifies whether API documentation is clear, complete, and includes
    practical examples such as sample code, queries, and structured references.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC10
  title: Does the platform’s documentation include or link to the API or data access terms of use?
  description: Verifies whether the platform’s documentation clearly states, or provides a direct link to, the API's terms of use. The assessment should review the documentation to confirm the presence of explicit legal terms that define permitted data access, usage conditions, and any applicable restrictions.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC11
  title: Does the platform’s API documentation detail the response format of each
    endpoint?
  description: Verifies whether the API documentation specifies response formats for
    endpoints, including examples and potential error codes, with explicit descriptions
    of response structures.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC12
  title: Does the platform provide its API documentation in the official languages
    of the assessed region?
  description: Verifies whether complete and up-to-date API documentation is available
    in the official languages of the region being assessed.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC13
  title: Does the platform’s API documentation detail the quota or rate limits applicable
    to each available endpoint?
  description: Verifies whether the documentation specifies rate limits and quotas
    for each endpoint, including variations by authentication level or endpoint type.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC14
  title: Does the platform provide a way to label content that has been generated
    with artificial intelligence?
  description: Verifies whether the platform automatically flags or allows users to
    flag AI-generated content and whether this information is exposed in the API response.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
completeness:
- code: UGC_OC15
  title: Can data from a publication’s comments be extracted using the platform’s
    API?
  description: Verifies whether comment data, including content, can be extracted
    when available—either together with publication data or via dedicated endpoints.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC16
  title: Can data from temporary content be extracted through the platform’s API?
  description: Verifies whether the API provides at least one endpoint for collecting
    data from temporary publications (e.g., stories or other ephemeral content) as
    structured data before expiration.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC17
  title: Can historical data be extracted through the platform’s API?
  description: Verifies whether endpoints allow the collection of public user-generated
    content data from a time range that extends more than one year prior to the request
    date.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC18
  title: Is the number of requests allowed by the API sufficient for monitoring more
    than 10,000 publications in 24 hours?
  description: Verifies whether the platform’s rate limits and quotas allow continuous
    extraction of data for more than 10,000 publications within a 24-hour period without
    losses.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
consistency:
- code: UGC_OC19
  title: Are the results returned by the API consistently reproducible?
  description: Verifies whether data extracted via the platform’s API at any given time is consistent with other collections performed similarly. The assessment should conduct repeated test queries to confirm the reproducibility of results or ground the response based on recent (less than 2 years) experiments published in peer-reviewed journals.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC20
  title: Is the data returned by the platform’s API consistent with the parameters
    and filters used in the request?
  description: Verifies whether the data returned by the API matches the filters and
    parameters specified, based on repeated test queries or recent validation studies.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
relevance:
- code: UGC_OC21
  title: Does the data extracted by the platform’s API reflect what is displayed on
    its user interface?
  description: Verifies whether the API data corresponds to the information displayed
    on the user interface at all levels of detail, including authorship, full content,
    interaction counts, and referenced content.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC22
  title: Does the platform's API allow for filtering data based on content or its author location?
  description: Verifies whether the API supports applying location-based filters to data extraction. The assessment should test the endpoint for the main content type to confirm that data on public posts can be filtered by content or author location.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC23
  title: Does the platform’s API allow for filtering data based on content language?
  description: Verifies whether the API allows applying language-based filters, enabling
    public post data to be filtered by content language.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
- code: UGC_OC24
  title: Does the platform’s API allow for filtering data by specific time periods?
  description: Verifies whether the API allows applying custom temporal filters so
    that public post data can be filtered by specific time ranges.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
timeliness:
- code: UGC_OC25
  title: Can data from newly published content be extracted from the platform’s API
    in near real time?
  description: Verifies whether the API allows the collection of data from specific
    content within approximately one hour of its publication, enabling near real-time
    monitoring.
  weight: 1.0
  answers:
  - value: 'no'
    label: 'No'
    weight: 0.0
  - value: 'yes'
    label: 'Yes'
    weight: 1.0
