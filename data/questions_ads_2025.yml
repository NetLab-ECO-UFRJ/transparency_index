  - code: AD_OC32
    title: Does the platform provide granular volume ranges for ad impressions?
    description: >
      This item verifies whether the ad repository provides impression values for ads, using ranges that closely
      approximate the actual numbers. Intervals should be no larger than 10% of the upper bound of the value range
      they represent. For example, values up to 1,000 impressions should be displayed in intervals no larger than 100;
      between 1,000 and 10,000 in intervals no larger than 1,000; between 10,000 and 100,000 in intervals no larger
      than 10,000; between 100,000 and 1 million or above, in intervals no larger than 100,000. The assessment should
      measure whether the reported intervals remain within this threshold across the different value ranges using the
      platform's documentation or available data interfaces.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
        label: "Yes, through the GUI"
        weight: 0.5
      - value: api
        label: "Yes, through the API"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC33
    title: Does the platform provide granular investment ranges for ad spending?
    description: >
      This item verifies whether the ad repository provides spending values for ads, using ranges that closely
      approximate the actual amounts. Intervals should be no larger than 10% of the upper bound of the value range
      they represent. For example, values up to $100 should be displayed in intervals no larger than $10; between $100
      and $1,000 in intervals no larger than $100; and between $1,000 and $10,000 in intervals no larger than $1,000.
      The assessment should measure whether the reported intervals remain within this threshold across the different
      value ranges using the platform's documentation or available data interfaces.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
