    title: Does the platform implement a proper deprecation strategy to avoid breaking client applications while rolling out major changes in the API?
    description: >
      This item verifies whether the platform's documentation describes a deprecation strategy with a grace period
      before removing features. The assessment should review changelogs to confirm that deprecated features are listed
      with deprecation and removal dates and include migration instructions. This item applies only to breaking changes
      that require client updates, such as endpoint modifications, authentication updates, or the removal of features.
    weight: 1.0
    answers:
      - value: 'yes'
        label: "Yes"
        weight: 1.0
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC21
    title: Does the platform's ad repository API documentation detail the response format of each endpoint?
    description: >
      This item verifies whether the platform's ad repository API documentation specifies the format of each possible
      response, including examples and potential errors. The assessment should review the documentation to confirm that
      response structures are described and illustrated with sample outputs.
    weight: 1.0
    answers:
      - value: 'yes'
        label: "Yes"
