- code: AD_OC4
  selected_answer: 'no'
  notes: This could not be verified due to the lack of API access at the time of the assessment and the inability to extract any data from the graphical interface despite multiple attempts.
- code: AD_OC5
  selected_answer: 'no'
  notes: The X Ads Repository GUI does not allow searches for specific ads using a unique identifier. This functionality [also does not appear to be supported by the Ad Repository API](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency). In addition, this could not be independently verified due to the lack of API access at the time of the assessment and the repeated inability to extract any data from the GUI.
- code: AD_OC6
  selected_answer: 'no'
  notes: In principle, this item could be met through the CSV files generated in the graphical interface. However, the feature was not functioning correctly at the time of the assessment (December 2025), as all searches returned empty files containing only headers. It could also theoretically be met via the API, but this could not be verified because access had not been granted.
- code: AD_OC7
  selected_answer: 'no'
  notes: The X Ads Repository GUI does not allow searches for specific ads using search terms. This functionality [also does not appear to be supported by the Ad Repository API](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency). In addition, this could not be independently verified due to the lack of API access at the time of the assessment and the repeated inability to extract any data from the GUI.
- code: AD_OC8
  selected_answer: 'no'
  notes: Official documentation does not explicitly confirm that the X Ads Repository uses locale-neutral data representation. In addition, this could not be independently verified due to the lack of API access at the time of the assessment and the repeated inability to extract any data from the GUI.
completeness_answers:
- code: AD_OC9
  selected_answer: 'no'
  notes: 'According to the [official documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency), the X Ads Repository “includes the following: advertiser, funding entity, the advertiser’s main targeting parameters, impressions, and reach,” with the aim of providing transparency around advertisements on the platform. In principle, this item could be met through the CSV files generated in the graphical interface. However, the feature was not functioning correctly at the time of the assessment (December 2025), as all searches returned empty files containing only headers. It could also theoretically be met via the API, but this could not be verified because access had not been granted.'
