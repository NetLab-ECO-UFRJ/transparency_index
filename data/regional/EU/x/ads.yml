metadata:
  platform: X
  scope: ADS
  evaluation_date: 2025-12
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: '[According to X/Twitter](https://help.x.com/en/rules-and-policies/dsa-vetted-researchers), access to data on ads delivered in the European Union under Article 40 of the Digital Services Act (DSA) is available through the X API for researchers. However, at the time of the assessment, access had not been granted. Our application remained pending without any response from the platform within a reasonable timeframe, and no reasons for non-approval were provided.'
- code: AD_SC2
  selected_answer: 'no'
  notes: The [X Ads Repository](https://ads.twitter.com/ads-repository) was launched in 2023 to comply with the requirements of the European Union’s Digital Services Act (DSA). For advertisements served in the EU, the repository is intended to provide key information on funding, targeting, and reach through [downloadable comma-separated values (CSV) files](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency). This constitutes the only available access point for ad data, as X does not display this information directly in the graphical user interface. Despite multiple attempts, we were unable to extract any substantive data, even though the documentation indicates that such extraction should be technically possible. We tested several prominent advertisers—including Amazon, Apple, and Netflix—across multiple EU countries (France, Germany, and Belgium) and across a range of time filters (custom dates, today, yesterday, past 7 days, current quarter, previous quarter, and past year). In all cases, the downloads produced CSV files containing only headers and no records. These findings are consistent with [recent conclusions by the European Commission](https://ec.europa.eu/commission/presscorner/detail/en/ip_25_2934), which fined X for non-compliance with the DSA, including excessive delays in processing data requests from its Ad Repository, thereby undermining its intended transparency function.
- code: AD_SC3
  selected_answer: 'no'
  notes: This could not be verified due to the lack of API access at the time of the assessment, as well as repeated failures to extract any data from the graphical interface despite multiple attempts.
accessibility_answers:
- code: AD_OC1
  selected_answer: 'no'
  notes: In principle, this item could be met through the CSV files generated in the graphical interface. However, the feature was not functioning correctly at the time of the assessment (December 2025), as all searches returned empty files containing only headers. It could also theoretically be met via the API, but this could not be verified because access had not been granted.
- code: AD_OC2
  selected_answer: both
  notes: The [X Ads Repository GUI](https://ads.twitter.com/ads-repository) is free and limited to ads delivered in the EU, while the API access is free and [subject to approval](https://docs.google.com/forms/d/e/1FAIpQLSdo0O-D6Kxa3cV4g1JLz2T_0Sk3hdEnTdv8dJmibagCnzJ7kg/viewform) from X under article 40 of the DSA.
