compliance_answers:
- code: UGC_OC7
  selected_answer: 'no'
  notes: The LinkedIn Researcher API documentation [does not provide a proper deprecation strategy](https://www.linkedin.com/help/linkedin/answer/a1645616).
- code: UGC_OC8
  selected_answer: 'no'
  notes: The LinkedIn Researcher API documentation is partially available in open access; however, the full documentation, including detailed explanations and usage examples, is [not publicly accessible](https://www.linkedin.com/help/linkedin/answer/a1645616). Given that previous researcher access documentation was made available to users [only after approval under the applicable terms](https://www.linkedin.com/legal/l/research-api-terms), it is likely that the complete documentation is not fully published in open access. As full Researcher API access was not granted at the time of this assessment, this material was therefore not visible.
- code: UGC_OC9
  selected_answer: 'no'
  notes: The open access LinkedIn Researcher API documentation is [not clearly written and exemplified](https://www.linkedin.com/help/linkedin/answer/a1645616).
- code: UGC_OC10
  selected_answer: 'yes'
  notes: The LinkedIn Researcher API documentation links to [its terms of use](https://www.linkedin.com/legal/l/research-api-terms).
- code: UGC_OC11
  selected_answer: 'no'
  notes: The open access LinkedIn Researcher API documentation [does not detail the response format of each endpoint](https://www.linkedin.com/help/linkedin/answer/a1645616).
- code: UGC_OC12
  selected_answer: 'no'
  notes: While the [open access LinkedIn Researcher API documentation](https://www.linkedin.com/legal/l/research-api-terms) is available in English, French, German, Spanish, Danish, Hungarian, Italian, Finnish, Italian, Romanian, Portuguese, Polish, Greek, Dutch, and Swedish, it is not available in all of the [24 official languages of the EU](https://european-union.europa.eu/principles-countries-history/languages_en).
- code: UGC_OC13
  selected_answer: 'no'
  notes: The open access LinkedIn Researcher API documentation [does not detail the quota or rate limits applicable to each available endpoint](https://www.linkedin.com/help/linkedin/answer/a1645616).
- code: UGC_OC14
  selected_answer: 'no'
  notes: Verification was not possible because API access was unavailable at the time of assessment, due to a pending request and the absence of any response from the platform.
