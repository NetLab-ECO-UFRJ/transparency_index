metadata:
  platform: LinkedIn
  region_code: EU
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: full
  notes: Data from all types of ads can be retrieved through the [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) and remains available for collection for up to one year after the ad’s last impression.
- code: AD_SC2
  selected_answer: 'no'
  notes: Although the [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/) allows users to view ads served on the platform for up to one year after their last impression, it does not provide any means to export structured data.
- code: AD_SC3
  selected_answer: 'full'
  notes: Both the LinkedIn Ad Library GUI and API allow users to see the most recent date an ad was served, enabling verification that data can be retrieved for both active and inactive ads.
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: The [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/) allows users to query and filter ads served to LinkedIn users for up to one year after their last impression.
- code: AD_OC2
  selected_answer: both
  notes: Access to the LinkedIn Ad Library, via both the API and the GUI, is free of charge.
- code: AD_OC3
  selected_answer: 'no'
  notes: The [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) returns only the ad URL, the period during which it ran and information about the advertiser—including their name, page URL, publication date and funder—but does not provide the ad creative itself.
- code: AD_OC4
  selected_answer: 'yes'
  notes: The [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) provides a form of authentication thatallows for renewal without the risk of data loss.
- code: AD_OC5
  selected_answer: gui
  notes: Through the [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/), it is possible to access the page of a specific ad. By contrast, the API does not allow ads to be retrieved by their ID.
- code: AD_OC6
  selected_answer: 'no'
  notes: On both LinkedIn Ad Library [GUI](https://www.linkedin.com/ad-library/) and [API](https://www.linkedin.com/ad-library/api), the advertiser search function retrieves only records containing the queried keyword, rather than allowing direct filtering by a specific advertiser via their username or unique identifier.
- code: AD_OC7
  selected_answer: both
  notes: It is possible to use keywords to perform searches both through the LinkedIn Ad Library [GUI](https://www.linkedin.com/ad-library/) and [API](https://www.linkedin.com/ad-library/api).
- code: AD_OC8
  selected_answer: api
  notes: Timestamps retrieved through the LinkedIn Ad Library API follow the Unix format (e.g., 1763337597116). By contrast, the LinkedIn Ad Library GUI returns abbreviated and extended date strings (e.g., “Jan 13, 2026 to Jan 15, 2026”), which hinders both readability and automated processing.
completeness_answers:
- code: AD_OC9
  selected_answer: both
  notes: The LinkedIn Ad Library provides URLs for the pages and profiles of the entities that ran the ads.
- code: AD_OC10
  selected_answer: both
  notes: The LinkedIn Ad Library provides the registered names of the ads’ funders.
- code: AD_OC11
  selected_answer: both
  notes: For ads served to users in the European Union, the LinkedIn Ad Library provides the time period during which they ran, both through the API and the GUI.
- code: AD_OC12
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any data on user engagement with ads.
- code: AD_OC13
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any data on advertisers’ verification status.
compliance_answers:
- code: AD_OC14
  selected_answer: both
  notes: Although restricted and moderated ads are difficult to search for and locate, they remain accessible through both the [LinkedIn Ad Library API and GUI](https://www.linkedin.com/ad-library/api/ads). In these cases, the interface specifies when the ads were last shown to users and includes a message explaining the reason for moderation. However, the ad content itself is not available for viewing.
- code: AD_OC15
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any information regarding the use of generative AI in the creation or manipulation of ad content.
- code: AD_OC16
  selected_answer: both
  notes: Any user can access [LinkedIn Ad Library’s documentation](https://www.linkedin.com/help/linkedin/answer/a1517918). Some public documentation for the GUI is available in the form of an [FAQ](https://www.linkedin.com/ad-library).
- code: AD_OC17
  selected_answer: both
  notes: From the perspective of a European user, the [LinkedIn Ad Library API documentation](https://www.linkedin.com/ad-library/api/ads) is comparatively more informative, as it includes a concrete response example for ads served in European Union countries. While limited in scope, this example offers clearer guidance on the structure and fields of the API’s output for EU-based transparency data.
- code: AD_OC18
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not reference any specific terms of use for either its API or its GUI.
- code: AD_OC19
  selected_answer: both
  notes: The LinkedIn Ad Library’s documentation is displayed in the [language defined by the user](https://www.linkedin.com/help/linkedin/answer/a522175).
- code: AD_OC20
  selected_answer: 'no'
  notes: The [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) does not describe any deprecation strategy intended to prevent breaking changes in client applications.
- code: AD_OC21
  selected_answer: 'yes'
  notes: The [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) details the response format of its sole available endpoint.
- code: AD_OC22
  selected_answer: 'no'
  notes: The [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) does not specify any usage quotas or rate limits.
consistency_answers:
- code: AD_OC23
  selected_answer: 'no'
  notes: Although the data retrieved via the LinkedIn Ad Library API broadly corresponds to what is displayed in the GUI, the platform does not provide sufficient information or mechanisms to enable a proper comparison between the two. The GUI search interface presents a preview of each ad’s media and text, whereas the API returns no information about ad content, providing only the ad’s URL, advertiser metadata, and the period during which the ad ran
- code: AD_OC24
  selected_answer: both
  notes: We conducted a test using the LinkedIn Ad Library API by issuing five identical requests with the same parameters, saving each response to a separate file, and comparing whether all ads appeared consistently across the files. We observed that the full set of ads was present in every response. The GUI was likewise found to return consistent results across repeated queries.
- code: AD_OC25
  selected_answer: gui
  notes: Because the LinkedIn Ad Library API does not return any information about ad creatives, it is not possible to verify whether the ads actually correspond to the queried keywords. This verification is, however, possible through the LinkedIn Ad Library GUI, where users can directly assess whether the returned ads match both the queried keywords and the specified time period.
relevance_answers:
- code: AD_OC26
  selected_answer: both
  notes: The LinkedIn Ad Library supports the application of a time period filter through both its API and GUI.
- code: AD_OC27
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not allow data to be filtered by ad category.
- code: AD_OC28
  selected_answer: 'no'
  notes: The LinkedIn Ad Library only allows data to be filtered by country.
accuracy_answers:
- code: AD_OC29
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any age or gender information about an ad’s audience.
- code: AD_OC30
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any subnational location data about an ad’s audience.
- code: AD_OC31
  selected_answer: 'no'
  notes: Both the LinkedIn Ad Library API and GUI display some of the targeting criteria applied to ads. However, even when targeting is used and the API responses indicate its application, these criteria are not described in sufficient detail. As a result, the platform does not meet the requirements for this item.
- code: AD_OC32
  selected_answer: 'no'
  notes: The LinkedIn Ad Library provides data on [ad impressions](https://www.linkedin.com/help/lms/answer/a1620070), but not at a sufficiently granular level.
- code: AD_OC33
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any data on ad spending.
